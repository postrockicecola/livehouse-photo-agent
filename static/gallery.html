<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Livehouse — streaming gallery</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111;
      --panel: #1a1a1a;
      --muted: #9ca3af;
      --accent: #ff6b35;
      --new: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: #e5e5e5;
      padding: 1rem 1.25rem 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem; }
    #gallery-status { font-size: 0.8rem; margin-bottom: 1.25rem; color: var(--muted); }
    section { margin-bottom: 2rem; }
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .section-head .badge {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      background: #262626;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .g-card {
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .g-card.is-new {
      border-color: var(--new);
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.35);
    }
    .g-thumb { display: block; background: #0a0a0a; }
    .g-thumb img {
      width: 100%;
      height: auto;
      vertical-align: middle;
      object-fit: contain;
      max-height: 220px;
    }
    .g-meta { padding: 0.5rem 0.65rem 0.65rem; font-size: 0.72rem; }
    .g-score { margin-bottom: 0.35rem; }
    .g-score-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .g-score-lbl { color: var(--muted); font-weight: 500; }
    .g-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.35rem; }
    .tag {
      background: #292524;
      color: #d6d3d1;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
    }
    .tags-empty { color: #525252; }
    .g-file { color: var(--muted); word-break: break-all; line-height: 1.3; }
  </style>
</head>
<body>
  <h1>Streaming gallery</h1>
  <div id="gallery-status">Starting poll…</div>

  <section>
    <div class="section-head">BEST <span class="badge" id="count-best">0</span></div>
    <div class="grid" id="grid-best"></div>
  </section>
  <section>
    <div class="section-head">KEEP <span class="badge" id="count-keep">0</span></div>
    <div class="grid" id="grid-keep"></div>
  </section>
  <section>
    <div class="section-head">TRASH <span class="badge" id="count-trash">0</span></div>
    <div class="grid" id="grid-trash"></div>
  </section>

  <script src="/static/gallery.js"></script>
</body>
</html>
