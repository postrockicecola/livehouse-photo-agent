apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rolloutjobs.rl.livehouse.ai
spec:
  group: rl.livehouse.ai
  scope: Namespaced
  names:
    kind: RolloutJob
    listKind: RolloutJobList
    plural: rolloutjobs
    singular: rolloutjob
    shortNames: ["rlj"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Job
          type: string
          jsonPath: .status.jobName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Desired state — how to run one RL training rollout loop.
              properties:
                image:
                  type: string
                  description: Container image that runs the trainer.
                budget:
                  type: integer
                  default: 30
                  description: Analyze calls per episode.
                iterations:
                  type: integer
                  default: 40
                  description: REINFORCE update steps.
                batch:
                  type: integer
                  default: 12
                  description: Episodes collected per iteration.
                learningRate:
                  type: string
                  default: "0.5"
                  description: Passed to --lr (string keeps the CRD float-free).
                synthetic:
                  type: boolean
                  description: Use the self-contained env (no data mounts). Defaults to true.
                syntheticN:
                  type: integer
                  default: 120
                  description: Synthetic candidate pool size.
                syntheticKeepers:
                  type: integer
                  default: 30
                  description: Synthetic keeper count (lowest fast_score).
                extraArgs:
                  type: array
                  items:
                    type: string
                  description: Extra args appended verbatim to the trainer command.
                backoffLimit:
                  type: integer
                  default: 1
                  description: backoffLimit for the underlying Job.
            status:
              type: object
              properties:
                phase:
                  type: string
                jobName:
                  type: string
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
