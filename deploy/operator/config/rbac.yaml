apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-operator
  namespace: livehouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rollout-operator
rules:
  - apiGroups: ["rl.livehouse.ai"]
    resources: ["rolloutjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rl.livehouse.ai"]
    resources: ["rolloutjobs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["rl.livehouse.ai"]
    resources: ["rolloutjobs/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # controller-runtime leader election + event recording
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rollout-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rollout-operator
subjects:
  - kind: ServiceAccount
    name: rollout-operator
    namespace: livehouse
